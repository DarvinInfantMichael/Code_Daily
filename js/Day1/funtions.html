// 1).Write a function that takes an age as input and returns a new object with the age updated using the spread operator.

//3).Write a function that returns all even numbers from an array.

const Eve = (...num) =>{
    const res=num.filter((n)=>n%2==0);
    return res;
}
console.log(Eve(1,2,3,4));

const Odd = (...num) =>{
    const res=num.filter((n)=>n%2!==0);
    return res;
}
console.log(Odd(1,2,3,4,5));

//4).Write a function that returns the sum of all elements in an array using reduce().

const total = (...arr) =>{
    const res = arr.reduce((res,arr)=>res + arr ,0);
    return res;
}
console.log(total(50,60,70,80));

//5). Write a function that converts all strings in an array to uppercase using map().

    const res = arr.map(n => n.toUpperCase());
    return res;
}
