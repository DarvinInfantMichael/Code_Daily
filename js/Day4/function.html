//1. User Login Workflow
// Problem
// Fetch User
// Verify User
// Login User
// Display "Login Successful"

const getFetch =()=>{

    return new Promise ((res,rej)=>{

        setTimeout(()=>{

            res("User Data Has Fetched Here......");

            if(false){
                rej("Error in feching....");
            }
        },1000);
    })
};

const userVerify=()=>{
return new Promise((res,rej)=>{

    setTimeout(()=>{
        res("User Data Has Verified successfully....");
        if(false){
            rej("User Verification Error...");
        }
    },1000);
})
};

const getLogin=()=>{
    return new Promise((re,rj)=>{
        setTimeout(()=>{

            re("UserLogin Successfully..");
            if(false){
                ("Error in Login..");
            }
        },1000);
    })
};

getFetch().then((data)=>{
    console.log(data);
    return userVerify();    
})
.then((data)=>{
    console.log(data);
    return getLogin();
    
})
.then((data)=>{
    console.log(data);
    console.log("Login work Completed..");
    
}).catch((err)=>{
console.log(err);

})
